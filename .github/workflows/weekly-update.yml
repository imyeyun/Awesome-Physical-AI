name: Weekly Stats Update

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest stats (GitHub + HuggingFace)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_stats.py

      - name: Regenerate README and dashboard data
        run: python scripts/generate_site.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models.yaml data/datasets.yaml docs/data.json docs/data.js README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly stats update $(date +'%Y-%m-%d')"
            git push
          fi
