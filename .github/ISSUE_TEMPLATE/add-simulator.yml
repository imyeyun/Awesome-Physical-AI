name: "Add a Simulator / Tool"
description: "Submit a new simulation framework, physics engine, or benchmark tool"
title: "[Simulator] "
labels: ["add-simulator"]
body:
  - type: markdown
    attributes:
      value: |
        ## 새 시뮬레이터 / 툴 추가 | Add a New Simulator / Tool
        양식을 작성해 주세요. 이슈 등록 후 봇이 자동으로 PR을 생성합니다.
        Please fill in the form. A bot will create a PR automatically.

  - type: input
    id: id
    attributes:
      label: "ID (slug)"
      description: "고유 식별자 (소문자, 하이픈만 사용) | Unique identifier (lowercase, hyphens only)"
      placeholder: "e.g. my-simulator"
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: "Name"
      description: "공식 이름 | Official name"
      placeholder: "e.g. MySimulator"
    validations:
      required: true

  - type: input
    id: organization
    attributes:
      label: "Organization"
      description: "개발한 기관/회사 | Institution or company"
      placeholder: "e.g. DeepMind"
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: "Year"
      description: "오픈소스 공개 연도 | Year of open-source release"
      placeholder: "e.g. 2022"
    validations:
      required: true

  - type: textarea
    id: description_en
    attributes:
      label: "Description (English)"
      description: "1-2 sentences describing the tool"
      placeholder: "A GPU-accelerated physics engine for..."
    validations:
      required: true

  - type: textarea
    id: description_ko
    attributes:
      label: "Description (Korean)"
      description: "1-2 문장으로 설명해 주세요"
      placeholder: "GPU 가속 물리 엔진으로..."
    validations:
      required: false

  - type: input
    id: github_url
    attributes:
      label: "GitHub URL"
      placeholder: "https://github.com/org/repo"
    validations:
      required: false

  - type: input
    id: paper_url
    attributes:
      label: "Paper URL (arXiv)"
      placeholder: "https://arxiv.org/abs/xxxx.xxxxx"
    validations:
      required: false

  - type: input
    id: project_url
    attributes:
      label: "Project / Docs URL"
      placeholder: "https://my-simulator.readthedocs.io"
    validations:
      required: false

  - type: dropdown
    id: type
    attributes:
      label: "Type"
      description: "시뮬레이터 종류 | Type of tool"
      options:
        - "physics_engine — 물리 엔진 (MuJoCo, Genesis 등)"
        - "rl_framework  — RL 학습 프레임워크 (Isaac Lab 등)"
        - "benchmark     — 벤치마크 / 평가 환경 (SimplerEnv, Robosuite 등)"
        - "full_stack    — 물리 + 학습 + 태스크 통합 (RoboCasa 등)"
    validations:
      required: true

  - type: checkboxes
    id: gpu_ros
    attributes:
      label: "Features"
      options:
        - label: "GPU-accelerated (병렬 시뮬레이션 지원)"
        - label: "ROS2 support"

  - type: input
    id: language
    attributes:
      label: "Primary Language(s)"
      description: "쉼표로 구분 | Comma-separated"
      placeholder: "e.g. python, c++"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: "Tags (optional)"
      description: "Comma-separated tags"
      placeholder: "e.g. locomotion, manipulation, sim-to-real"

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "The tool is open-source (publicly available on GitHub)"
          required: true
        - label: "At least one URL (GitHub, paper, or project page) is provided"
          required: true
        - label: "I have read the contribution guidelines"
          required: true
